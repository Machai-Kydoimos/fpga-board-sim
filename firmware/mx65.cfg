# ld65 linker config - bare-metal 6502 ROM for the embedded-core simulator.
#
# Produces a 2 KB raw image of $F800-$FFFF (code at the bottom, the CPU
# reset/IRQ/NMI vectors at $FFFA-$FFFF) that maps directly onto cpu_rom in
# hdl/mx65_walking_counter_7seg.vhd (ROM offset = address - $F800).
#
# `fill = yes` pads the whole region with $00 so the output is exactly 2048
# bytes regardless of program size.

MEMORY {
    ROM: start = $F800, size = $0800, type = ro, fill = yes, fillval = $00, file = %O;
}

SEGMENTS {
    CODE:    load = ROM, type = ro;
    RODATA:  load = ROM, type = ro, optional = yes;   # lookup tables (Stage 2)
    VECTORS: load = ROM, type = ro, start = $FFFA;
}
