name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy .
      - run: uv run rumdl check .

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - name: Run tests (no GHDL/NVC)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: uv run pytest -m "not slow"

  test-linux-ghdl:
    name: Test Linux + GHDL (Python 3.12)
    runs-on: ubuntu-24.04  # pinned: matches the ubuntu24.04 GHDL release binary below
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - name: Install GHDL v6.0.0 (pinned release, matches Windows job)
        run: |
          ver="6.0.0"
          url="https://github.com/ghdl/ghdl/releases/download/v$ver/ghdl-mcode-$ver-ubuntu24.04-x86_64.tar.gz"
          curl -sSL -o ghdl.tar.gz "$url"
          expected="30d6a977b8456d140bbafecbbe64b1947a3d92eeae8f5e6d9f528a174f9566e7"
          actual="$(sha256sum ghdl.tar.gz | cut -d' ' -f1)"
          if [ "$actual" != "$expected" ]; then
            echo "GHDL checksum mismatch: expected $expected, got $actual" >&2
            exit 1
          fi
          mkdir -p "$HOME/ghdl"
          tar -xzf ghdl.tar.gz -C "$HOME/ghdl"
          dirname "$(find "$HOME/ghdl" -name ghdl -type f | head -1)" >> "$GITHUB_PATH"
      - name: Verify GHDL
        run: ghdl --version
      - name: Run full test suite
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: uv run pytest

  test-linux-nvc:
    name: Test Linux + NVC (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - uses: nickg/setup-nvc@48f966dfc9b27bf13e873a473fcf1649ef8f5a0f  # v1
      - name: Verify NVC
        run: nvc --version
      - name: Run full test suite
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: uv run pytest

  # U35: exercise the full + slow suites against GHDL's compiled code generators
  # (llvm AOT + llvm-jit), which the picker now lets users select.  Not a
  # branch-protection required check — Rick promotes it once it has settled.
  test-linux-ghdl-llvm:
    name: Test Linux + GHDL-${{ matrix.backend.name }} (Python 3.12)
    runs-on: ubuntu-24.04  # pinned: matches the ubuntu24.04 GHDL release binary below
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        backend:
          - flavor: llvm
            name: LLVM
            sha256: e0064cd3d1569e7fca27b186b0d71e80c087de90db4e466ed77dc669a574d8bc
          - flavor: llvm-jit
            name: LLVM-JIT
            sha256: 2250f49e5334885fe9b50597b8f8607304ea3dc6c947489812f9e2a5afa35f23
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - name: Install GNAT 13 runtime (ghdl1-llvm needs libgnat-13.so)
        # The v6.0.0 release binaries were built with GNAT 13; ubuntu-24.04 ships
        # GNAT 14, so the AOT code generator's ghdl1-llvm can't load libgnat-13.so
        # without this.  Harmless for llvm-jit (in-memory; no ghdl1-llvm exec).
        run: sudo apt-get update && sudo apt-get install -y libgnat-13
      - name: Cache GHDL ${{ matrix.backend.name }} install
        id: cache-ghdl
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/ghdl
          # Keyed on the pinned version + sha256, so a re-pinned asset re-downloads;
          # a warm cache survives a GitHub-releases CDN blip (so this job is safe to
          # make a required check).
          key: ghdl-${{ runner.os }}-${{ matrix.backend.flavor }}-6.0.0-${{ matrix.backend.sha256 }}
      - name: Install GHDL v6.0.0 ${{ matrix.backend.name }} (pinned release)
        if: steps.cache-ghdl.outputs.cache-hit != 'true'
        run: |
          ver="6.0.0"
          url="https://github.com/ghdl/ghdl/releases/download/v$ver/ghdl-${{ matrix.backend.flavor }}-$ver-ubuntu24.04-x86_64.tar.gz"
          curl -sSL -o ghdl.tar.gz "$url"
          expected="${{ matrix.backend.sha256 }}"
          actual="$(sha256sum ghdl.tar.gz | cut -d' ' -f1)"
          if [ "$actual" != "$expected" ]; then
            echo "GHDL checksum mismatch: expected $expected, got $actual" >&2
            exit 1
          fi
          mkdir -p "$HOME/ghdl"
          tar -xzf ghdl.tar.gz -C "$HOME/ghdl"
      - name: Add GHDL to PATH
        run: dirname "$(find "$HOME/ghdl" -name ghdl -type f | head -1)" >> "$GITHUB_PATH"
      - name: Verify GHDL (expect ${{ matrix.backend.name }} code generator)
        run: ghdl --version
      - name: Run full + slow test suite
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: uv run pytest

  test-windows-ghdl:
    name: Test Windows + GHDL (Python 3.12)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - name: Install GHDL
        shell: pwsh
        run: |
          $ver = "6.0.0"
          $url = "https://github.com/ghdl/ghdl/releases/download/v$ver/ghdl-mcode-$ver-ucrt64.zip"
          Invoke-WebRequest -Uri $url -OutFile ghdl.zip
          $expected = "76E160CEEC35834C73ADA6E4E484416D13AED4B64CBC7C74C5CCA53A7EF60E41"
          $actual = (Get-FileHash ghdl.zip -Algorithm SHA256).Hash
          if ($actual -ne $expected) { throw "GHDL checksum mismatch: expected $expected, got $actual" }
          Expand-Archive ghdl.zip -DestinationPath C:\ghdl
          $bin = Get-ChildItem -Recurse C:\ghdl -Filter ghdl.exe |
                   Select-Object -First 1 -ExpandProperty DirectoryName
          echo $bin >> $env:GITHUB_PATH
      - name: Verify GHDL
        run: ghdl --version
      - name: Run full test suite
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: uv run pytest
