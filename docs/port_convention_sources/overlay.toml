# Hand-maintained, cited facts the constraint files themselves cannot state:
# signal polarity, the canonical clock on a multi-clock board, 7-seg style
# overrides. Every override sub-table carries a `cite` explaining where the
# fact comes from -- never invented, always traceable.
#
# The A3 generator applies these AFTER parse+classify and BEFORE the width
# cross-check, so an overlay value always wins over whatever was classified
# for the same field. `clk` overrides the whole clk name directly; `buttons`/
# `leds`/`switches`/`seven_seg` override just their `active_low` (classify()
# only ever derives that from a literal `_N`/`_n` name suffix -- see
# port_convention_parsers/classify.py's module docstring -- so most real
# boards need it stated here instead).
#
# Board names must match a docs/port_convention_sources/*.toml row's `name`
# field exactly, same as waves.toml.

[[board]]
name = "DE10-Standard"
clk = "CLOCK_50"
clk_cite = "docs/port_convention_sources/terasic.toml DE10-Standard row's own clk evidence (verified by direct fetch 2026-07-11): 'CLOCK_50 (plus CLOCK2_50 / CLOCK3_50 / CLOCK4_50)'. The fetched QSF's other clk-shaped names are PLL-derived auxiliary clocks, not the board's primary 50 MHz oscillator classify() would otherwise pick by file order."

  [board.buttons]
  active_low = true
  cite = "Rick's existing hand-authored boards/custom/de10_standard.json (Terasic KEY pushbuttons are active-low, per Terasic user-manual convention)."

  [board.seven_seg]
  active_low = true
  cite = "Rick's existing hand-authored boards/custom/de10_standard.json."

[[board]]
name = "DE2-115"
clk = "CLOCK_50"
clk_cite = "docs/port_convention_sources/terasic.toml DE2-115 row's own clk evidence (verified by direct fetch 2026-07-11): 'CLOCK_50 (plus CLOCK2_50 / CLOCK3_50)'. The fetched QSF's other clk-shaped names are Ethernet PHY/GTX clocks, not the board's primary oscillator."

  [board.buttons]
  active_low = true
  cite = "Rick's existing hand-authored boards/custom/de2_115.json."

  [board.seven_seg]
  active_low = true
  cite = "Rick's existing hand-authored boards/custom/de2_115.json."

# --- U21 A4 Wave 1 (cited canonical-naming trust; see waves.toml + terasic.toml) ---
# These three Terasic teaching boards populate from community-hosted QSFs whose
# port names are vendor-canonical (vouched per-source in terasic.toml). Their
# rank-1 QSFs, like every constraint file, cannot state signal polarity, so the
# active-low facts below come from the Terasic user manuals (same as the two
# hand-authored boards above). LEDs are active-high on these boards (no override).

[[board]]
name = "DE0 CV"

  [board.buttons]
  active_low = true
  cite = "Terasic KEY pushbuttons are active-low (pressed = 0), per the DE0-CV user manual; a QSF only binds names to pins, so classify() cannot derive polarity."

  [board.seven_seg]
  active_low = true
  cite = "Terasic HEX 7-segment displays are active-low (segment lit = 0), per the DE0-CV user manual."

[[board]]
name = "DE1 SoC"
clk = "CLOCK_50"
clk_cite = "The DE1-SoC's primary 50 MHz oscillator is CLOCK_50 (Terasic DE1-SoC user manual). The rank-1 QSF also defines CLOCK2_50 / CLOCK3_50 / CLOCK4_50 and ADC_SCLK, and classify()'s file-order fallback picks ADC_SCLK; verified by direct fetch 2026-07-12 ('PIN_AF14 -to CLOCK_50')."

  [board.buttons]
  active_low = true
  cite = "Terasic KEY pushbuttons are active-low (pressed = 0), per the DE1-SoC user manual."

  [board.seven_seg]
  active_low = true
  cite = "Terasic HEX 7-segment displays are active-low (segment lit = 0), per the DE1-SoC user manual."

[[board]]
name = "DE0 Nano"

  [board.buttons]
  active_low = true
  cite = "Terasic KEY pushbuttons are active-low (pressed = 0), per the DE0-Nano user manual. (DE0-Nano has no 7-segment display, so no seven_seg override.)"

# DE0 (original Cyclone III): canonical names (LEDG / SW / BUTTON / CLOCK_50 / HEXn_D+HEXn_DP)
# are used verbatim by the rank-1 source -- no rename -- so it takes the standard naming vouch
# (terasic.toml), not the overlay name-override. Only the clk needs pinning (classify() mis-picks
# GPIO0_CLKIN) plus the polarity facts a QSF cannot state.

[[board]]
name = "DE0"
clk = "CLOCK_50"
clk_cite = "The DE0's primary 50 MHz oscillator is CLOCK_50 (the board also has CLOCK_50_2), per the official DE0 CD-ROM v1.1 golden top (Demonstrations/DE0_Default/DE0_Default.qsf). classify()'s fallback otherwise mis-picks GPIO0_CLKIN."

  [board.buttons]
  active_low = true
  cite = "The DE0's three BUTTON pushbuttons are active-low (pressed = 0), per the DE0 user manual; a QSF only binds names to pins, so classify() cannot derive polarity."

  [board.seven_seg]
  active_low = true
  cite = "The DE0's HEX 7-segment displays are active-low (segment lit = 0), per the DE0 user manual."

# --- U21 A4 follow-up: Terasic System-CD rescue via cited overlay name-override ---
# DE10-Lite's verified rank-1 course QSF uses the vendor-canonical SW / KEY / HEX
# names but renames LEDR -> LED and the clock MAX10_CLK1_50 -> Clk. The cited
# overrides below restore both to canonical -- the per-board trust signal
# _overlay_supplies_cited_canonical_names reads -- verified against the official
# DE10-Lite System CD golden top. cite-not-copy: the Terasic CD is copyrighted, so
# we record the fact plus a versioned file citation, never the QSF itself.

[[board]]
name = "DE10 Lite"
clk = "MAX10_CLK1_50"
clk_cite = "The DE10-Lite's primary 50 MHz clock is MAX10_CLK1_50 (the board also exposes MAX10_CLK2_50 and ADC_CLK_10), per the official DE10-Lite System CD v2.2.0 golden top (Demonstrations/Golden_Top/DE10_LITE_Golden_Top.qsf). The rank-1 course QSF renames it to 'Clk'."

  [board.leds]
  name = "LEDR"
  cite = "The DE10-Lite's 10 user LEDs are canonically LEDR[9:0], per the official DE10-Lite System CD v2.2.0 golden top (Demonstrations/Golden_Top/DE10_LITE_Golden_Top.qsf, 'set_location_assignment ... -to LEDR[0..9]'). The rank-1 course QSF renames them to 'LED'."

  [board.buttons]
  active_low = true
  cite = "Terasic KEY pushbuttons are active-low (pressed = 0), per the DE10-Lite user manual; a QSF only binds names to pins, so classify() cannot derive polarity."

  [board.seven_seg]
  active_low = true
  cite = "Terasic HEX 7-segment displays are active-low (segment lit = 0), per the DE10-Lite user manual."

# --- U33 Wave 2 (clean official-repo boards; see waves.toml, #231) ---
# Only Tang Nano 9K needs an overlay: its LEDs are active-low, which a Gowin CST
# (like every constraint file) cannot state. Alchitry Au / Icepi Zero / Trellisboard
# are active-high, matching their board JSON's framework-derived `inverted` model, so
# they need no overlay.

[[board]]
name = "Tang Nano 9K"

  [board.leds]
  active_low = true
  cite = "The Sipeed Tang Nano 9K's 6 user LEDs are active-low (driven low to light: LED anode to 3V3 through a resistor, cathode to the FPGA pin), per the Sipeed Tang Nano 9K schematic; the litex-boards platform already captures this (boards/litex-boards/sipeed_tang_nano_9k.json leds[].inverted = true). A Gowin CST binds names to pins only, so classify() cannot derive polarity."

# --- U33 Wave 3 (subset partial conventions; see waves.toml, #233) ---

[[board]]
name = "Sipeed Tang Nano 20k"

  [board.leds]
  active_low = true
  cite = "The Sipeed Tang Nano 20K's 6 user LEDs are active-low (driven low to light), consistent with its Tang Nano 9K sibling (U33 Wave 2): the litex-boards platform names the bank `led_n` -- litex's active-low naming convention. A Gowin CST binds names to pins only, so classify() cannot derive polarity."

# --- U33 Wave 4 (RHS Research PCIe cards; see waves.toml, #237) ---
# Litefury + Nitefury II drive their 4 user LEDs (LED_A1..LED_A4) active-low. An XDC binds
# names to pins only, so classify() cannot derive polarity; the cited fact comes from the
# vendor's own sample HDL, which also contradicts the amaranth platform's active-high model.

[[board]]
name = "Litefury"

  [board.leds]
  active_low = true
  cite = "The Litefury's 4 user LEDs (LED_A1..LED_A4) are active-low -- driven low to light. RHS Research's official sample-project HDL declares `localparam LED_ON = 1'b0; localparam LED_OFF = 1'b1;` in Sample-Projects/Project-0/FPGA/common/HDL/CodeBlinker.v (the module that drives the LEDs); the board's constraint XDC corroborates with `PULLUP true` on each LED_A pin. (The amaranth-boards platform models these active-high, inverted=False -- incorrect per the vendor's own blinker.)"

[[board]]
name = "Nitefury II"

  [board.leds]
  active_low = true
  cite = "The Nitefury II's 4 user LEDs (LED_A1..LED_A4) are active-low -- driven low to light, per RHS Research's official sample-project HDL (Sample-Projects/Project-0/FPGA/Nitefury-II/.../HDL/CodeBlinker.v: `localparam LED_ON = 1'b0`), identical to its Litefury sibling; the board's constraint XDC corroborates with `PULLUP true` on each LED_A pin. (The amaranth-boards platform models these active-high, inverted=False -- incorrect per the vendor's own blinker.)"
