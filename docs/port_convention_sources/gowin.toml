# Port-convention source registry — Gowin / Sipeed Tang
# One [[board]] per physical board; ranked, fetch-verified pointers to the
# canonical constraint/pin file(s). See README.md in this directory for the
# schema, enums, and status semantics. Machine-parseable (tomllib).
# Curated 2026-07-11; discovery: Haiku batch agents (rubric v2) + Fable consolidation.

[[board]]
name = "Myminieye Runber"
files = ["litex-boards/myminieye_runber.json"]
maker = "Myminieye"
status = "verified"
notes = "7-segment display (4 digits). Comprehensive documentation in GitHub README. Common cathode display."

  [[board.source]]
  rank = 1
  kind = "official-repo"
  format = "MD"
  url = "https://raw.githubusercontent.com/myminieye/Runber/main/README.md"
  fetched = true
  retrieved = "2026-07-11"
  license = "unknown"
  device_evidence = "GW1N-UV4LQ144C6/I5 confirmed in README and multiple .cst files"
  clk = "clk on pin 4 (FPGA_CLK_12M, 12 MHz oscillator)"
  leds = "LED1-LED8 on pins 23-30 (8 monochrome LEDs, active-high)"
  buttons = "KEY1-KEY8 on pins 58-65 (8 soft-touch keys, active-low when pressed)"
  switches = "SW1-SW8 on pins 75-83 (8 DIP switches, active-high when closed)"
  seven_seg = "4-digit common cathode display; digit select SEG_DIG1-4 on pins 137,140,141,7; segments a-g on pins 138,142,9,11,12,139,8; DP on pin 10"
  active_low = "Keys active-low (IO recognizes high by default, gets low when pressed); switches active-high (recognizes low by default, gets high when closed)"
  evidence = ["IO_LOC \"clk\" 4;", "IO_LOC \"led[0-7]\" 23-30;", "IO_LOC \"key\" 58-65;", "IO_LOC \"sw[0-7]\" 75-83;"]

  [[board.source]]
  rank = 2
  kind = "official-repo"
  format = "CST"
  url = "https://raw.githubusercontent.com/myminieye/Runber/main/Runber_Development_Board_Sourse_Code/course9_seg1/SEG_1/src/top_seq.cst"
  fetched = true
  retrieved = "2026-07-11"
  license = "copyright Gowin Semiconductor"
  device_evidence = "GW1N-UV4LQ144C6/I5 in file header"
  clk = "clk on pin 4"
  leds = "none in this file (7-segment focus)"
  buttons = "none in this file"
  switches = "none in this file"
  seven_seg = "dig[0-3] on pins 137,140,141,7; smg[0-7] on pins 8,139,12,11,9,142,138,10"
  active_low = "not visible in this file"
  evidence = ["IO_LOC \"clk\" 4;", "IO_LOC \"dig[0]\" 137;", "IO_LOC \"smg[0-7]\" 8,139,12,11,9,142,138,10;"]

  [[board.source]]
