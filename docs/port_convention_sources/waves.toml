# Explicit, reviewable board-name lists per port_conventions population wave
# (U21 arc, Part A). A board name here must match a
# docs/port_convention_sources/*.toml row's `name` field exactly -- the A3
# generator's row gate checks wave membership by that name.
#
# Waves accumulate: once a wave has shipped (A4), its boards stay listed
# here (harmless -- a board with an already-populated, unchanged convention
# just regenerates identically on a later --check run) and the next wave's
# list is appended, never replaces a prior one.
#
# Being listed here is necessary but not sufficient: the row gate also
# requires registry status "verified", a rank-1 source of kind
# vendor-official/official-repo, and a usable (fetched, structured-format)
# source. A board can appear here ahead of its registry row catching up --
# the gate then holds it back until that happens, which is by design, not
# a bug to route around.

[[wave]]
number = 1
description = "Teaching / 7-seg first (docs/u21_board_native_vhdl_plan.md Part A, A4, Wave 1). Realized scope: 5 boards populate -- DE0-CV, DE1-SoC, DE0-Nano, DE0 via cited canonical-naming trust (DE0 also needed the A2 split HEXn_D/_DP classifier extension), and DE10-Lite via a cited overlay resource-name override (the A4 System-CD follow-up); the other 5 stay listed but are held back by the gate or the width cross-check for the per-board reasons noted below (each auto-includes itself once its blocker is resolved)."
boards = [
  # -- Populated in A4 Wave 1 (cited canonical-naming trust; see terasic.toml naming_cite + overlay.toml):
  "DE0 CV",
  "DE1 SoC",
  "DE0 Nano",
  "DE0",              # canonical names (LEDG/SW/BUTTON/CLOCK_50, HEXn_D[6:0]+HEXn_DP); populated once the
                      # A2 classifier learned the split HEXn_D/_DP per-digit style (-> individual) and the
                      # green-only LED bank was routed to `leds`. clk pinned via overlay (System-CD follow-up).
  # -- Populated via the A4 System-CD follow-up (cited overlay resource-name override; see overlay.toml):
  "DE10 Lite",        # rank-1 course QSF renames LEDR -> LED and MAX10_CLK1_50 -> Clk; a cited overlay
                      # name-override restores both to canonical (DE10-Lite System CD v2.2.0 golden top),
                      # so the shipped convention names are vendor-canonical.
  # -- Listed but held back (by design -- they stay listed so a later fix auto-includes them):
  "DE10 Nano",        # registry status "candidate" (gate holds until "verified"); source is sparse (clk+leds only).
  "Nandland Go",      # board JSON has 0 switches vs the PCF's 4 (width cross-check skips); also rank-1 kind "personal".
  "RZEasy FPGAA2-2",  # rank-1 QSF has 5 buttons (KEY[0..4]) but the board JSON lists 4 (pin 25 / KEY[4] missing upstream).
  "Rz Easyfpga",      # same physical board via litex-boards; same 5-vs-4 button width gap.
  "Myminieye Runber", # rank-1 is MD (README, no parser); rank-2/3 CST are incomplete (would yield a partial convention only).
]

[[wave]]
number = 2
description = "Clean official-repo boards (U33, #231). Scope was set empirically, not by the plan doc's old ~35 estimate: force-checking all 61 gate-eligible framework-only boards through the A3 generator showed only 13 produce a clean, complete, width-passing convention today (the rest are clk-only, width-mismatched vs the board JSON, or fetch/classifier failures -- see the deferred map below). This wave ships the 4 highest-confidence of those 13 -- popular boards whose canonical names genuinely differ from the framework block, each an official-repo (auto-trust-gated) source with polarity that matches the board JSON's own framework-derived `inverted` model (so nothing is invented): Alchitry Au (Xilinx, active-high), Tang Nano 9K (Gowin, active-low -- cited overlay), Icepi Zero + Trellisboard (ECP5, active-high, full clk+led+btn)."
boards = [
  "Alchitry Au",    # amaranth/XDC; led[8] + clk (canonical `clk` vs amaranth `clk100`); active-high.
  "Tang Nano 9K",   # litex+amaranth/Gowin CST; led[6] + sys_clk (real Gowin names vs litex user_led/clk100);
                    # LEDs active-low -> cited overlay (board JSON leds[].inverted=true, Sipeed schematic).
  "Icepi Zero",     # litex/LPF; led[5] + button[2] + clk; active-high.
  "Trellisboard",   # litex/LPF; led[12] + btn[4] + clk_12; active-high.
]

[[wave]]
number = 3
description = "Subset partial conventions (U33, #233). cross_check_widths was stricter than U31/U32 need -- it rejected a source bank NARROWER than the board, but the native wrapper already zero-extends a short LED bank and feeds the low bits of a short input bank (the same adaptation U32 gives framework banks). It now allows source <= board (blocks only source > board), so a board whose own constraint file wires up only some of its LEDs/buttons can get a canonical PARTIAL convention. Per-board verification matters (a subset isn't automatically a legit partial): most gate-eligible subset boards are unclean (see the deferred map). Tang Nano 20k is the clean one -- its source `leds`[6] covers the 6 plain LEDs and the board's 7th LED is an RGB (the Arty pattern), so 6/7 is correct."
boards = [
  "Sipeed Tang Nano 20k",  # litex/Gowin CST; leds[6] + clk (real Sipeed names vs litex user_led/clk100);
                           # board's 7th LED is an RGB -> partial 6/7 (wrapper zero-extends). LEDs
                           # active-low (litex `led_n` naming, sibling of Wave-2 Tang Nano 9K) -> overlay.
]

[[wave]]
number = 4
description = "RHS Research PCIe cards (U33, #237). Litefury + Nitefury II populate from their official sample-project XDC as a clk+LED *partial* convention (clk = pcie_clkin_p -- the board's 100 MHz PCIe reference clock; leds = LED_A1..LED_A4; no switches/buttons, so U31 ties off the absent input banks). Their LEDs are active-low -- cited to the vendor's own sample HDL CodeBlinker.v (`localparam LED_ON = 1'b0; localparam LED_OFF = 1'b1;`), which also reveals the amaranth-boards platform's active-high model (inverted=False) is wrong for these boards. This corrects the stale deferred-map note below (they do NOT classify to name=None -- classify() returns {names:[LED_A1..A4], width:4}). NB: the same-numbered Wave-4 parser fix (#235, oled/segled LED-misclassification) is separate code work under the shared 'Wave 4' label."
boards = [
  "Litefury",
  "Nitefury II",
]

