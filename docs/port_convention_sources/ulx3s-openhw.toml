[[board]]
name = "ULX3 S (all variants 12F-85F)"
files = ["amaranth-boards/ulx3_s-12_f.json", "amaranth-boards/ulx3_s-25_f.json", "amaranth-boards/ulx3_s-45_f.json", "amaranth-boards/ulx3_s-85_f.json", "litex-boards/radiona_ulx3s.json"]
maker = "Radiona"
status = "verified"
notes = "All four size variants (12F, 25F, 45F, 85F) share identical pinout despite different device capacities. Two sources provide identical pin information (amaranth-boards and litex-boards). Port names differ slightly between sources (generic indices vs named buttons). | inline fix 2026-07-11: canonical ulx3s_v20.lpf fetched via GitHub API (previous sources were own-upstream and dropped)"

  [[board.source]]
  rank = 1
  kind = "official-repo"
  format = "LPF"
  url = "https://raw.githubusercontent.com/emard/ulx3s/master/doc/constraints/ulx3s_v20.lpf"
  fetched = true
  retrieved = "2026-07-11"
  license = "unknown"
  device_evidence = "canonical emard/ulx3s repo; one v20 LPF covers the 12F/25F/45F/85F variants"
  clk = "clk_25mhz"
  leds = "led[7:0]"
  buttons = "btn[6:0] (btn[0]=BTN_PWRn, inverted logic per LPF comment; FIRE1/2 + UP/DOWN/LEFT/RIGHT)"
  switches = "sw[3:0] (SW1-SW4)"
  seven_seg = "none"
  active_low = "btn[0] BTN_PWRn documented as inverted logic in the LPF comment; others not stated"
  evidence = ["LOCATE COMP \"clk_25mhz\" SITE \"G2\";", "LOCATE COMP \"led[7]\" SITE \"H3\";", "LOCATE COMP \"btn[0]\" SITE \"D6\";  # BTN_PWRn (inverted logic)", "LOCATE COMP \"sw[0]\" SITE \"E8\"; # SW1"]

