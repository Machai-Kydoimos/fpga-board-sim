# LED color source registry — Digilent
#
# One [[board]] per physical board; each [[board.bank]] cites the color of one
# LED bank (a consecutive same-`name` run in the board JSON's `leds[]`).  See
# README.md in this directory for the schema and the verify-or-omit rule.
#
# Digilent does not encode the color in the LED resource name (the XDCs comment
# `## LEDs` / `## RGB LEDs` but the mono LEDs are bare `led[n]`), and unlike the
# Terasic manuals the color is not always stated in prose — some Reference
# Manuals say only "N individual LEDs" (Arty A7, Zybo), while others do state it
# ("four green LEDs", Genesys ZU).  So every color below is quoted from the
# board's own Reference Manual: preferably a prose color statement, otherwise the
# RM's GPIO / Basic-I/O partial-schematic figure, which draws each user LED in
# its actual color (a green diode symbol) and shows its polarity (anode -> pin
# via a series resistor => active-high).  digilent.com is Cloudflare-walled, so
# each source was fetched via the Wayback Machine (web.archive.org); the cited
# RM page + figure/section are reproducible there.  Every Digilent user (mono)
# LED verified so far is GREEN and active-high.  Curated 2026-07-22.
#
# nexys_4 / nexys_4_ddr joined at U37: their two RGB LEDs are now proper
# 3-pin `rgb_led` components, so `match = "led"` cleanly greens the sixteen
# mono LEDs without touching the RGB channels (the U36d deferral is resolved).
# Cora Z7 / Eclypse Z7 are RGB-only.  The non-Digilent "Sword" board has no
# citable color source (its Digilent Vivado board file defines LED pins but no
# color) and keeps the theme fallback.

[[board]]
name = "Arty A7"
files = ["digilent-xdc/arty.json", "digilent-xdc/arty_a7-35.json", "digilent-xdc/arty_a7-100.json"]
maker = "Digilent"

  [[board.bank]]
  match = "led"
  color = "green"
  source = "Arty A7 Reference Manual, Fig. 9.1 'Arty A7 GPIO' (digilent.com/reference/programmable-logic/arty-a7/reference-manual via web.archive.org, snapshot 2024-11-07): the four individual LEDs LD4-LD7 are drawn as green LED symbols, active-high (anode via a series resistor to the FPGA). Prose corroborates count and polarity: 'The four individual high-efficiency LEDs are anode-connected to the FPGA via 330-ohm resistors'."

