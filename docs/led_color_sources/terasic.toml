# LED color source registry — Terasic
#
# One [[board]] per physical board; each [[board.bank]] cites the color of one
# LED bank (a consecutive same-`name` run in the board JSON's `leds[]`).  See
# README.md in this directory for the schema and the verify-or-omit rule.
#
# The color of a bare `led` bank is NOT encoded in its resource name, and the
# LEDR/LEDG port-naming convention is a Terasic idiom, not a cross-vendor law
# (DE0 is LEDG=green, most DE-series are LEDR=red) — so every color below is
# quoted from the board's own Terasic User Manual (a fetched source), with the
# canonical LEDR/LEDG port name (and, where available, the schematic) as
# corroboration.  Curated 2026-07-21 from the boards' Terasic System CDs.

[[board]]
name = "DE0"
files = ["amaranth-boards/de0.json"]
maker = "Terasic"

  [[board.bank]]
  match = "led"
  color = "green"
  source = "DE0 User Manual (Terasic DE0 CD-ROM v1.1), Using the LEDs: \"10 green user LEDs\"; \"10 Green color LEDs (Active high)\". Corroborated by the canonical port name LEDG and schematic DE0_V12_RELEASE.pdf."

[[board]]
name = "DE0-Nano"
files = ["amaranth-boards/de0_nano.json"]
maker = "Terasic"

  [[board.bank]]
  match = "led"
  color = "green"
  source = "DE0-Nano User Manual (Terasic System CD v1.2.8): \"8 green LEDs\"; \"There are 8 green user-controllable LEDs on the DE0-Nano board\". Corroborated by schematic de0-nano-c4-rev-f."

[[board]]
name = "DE0-CV"
files = ["amaranth-boards/de0_cv.json"]
maker = "Terasic"

  [[board.bank]]
  match = "led"
  color = "red"
  source = "DE0-CV User Manual (Terasic System CD v1.2.1), Using the LEDs: \"the red LEDs are blinking\"; user-LED pin table LEDR[0..9]. Corroborated by the canonical port name LEDR and schematic DE0-CV.pdf (LEDR nets)."

