[project]
name = "fpga-simulator"
version = "0.1.0"
description = "Interactive FPGA board simulator with GHDL-backed VHDL simulation"
requires-python = ">=3.10"
dependencies = [
    "pygame>=2.5",
    "cocotb>=2.0",
    "find_libpython",
]

[project.scripts]
fpga-sim = "fpga_board:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
